<!doctype html>
<html lang="ja" class="dark">
  <head>
    <meta charset="UTF-8" />
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>玄武 管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: { extend: {} },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body { font-family: 'Noto Sans JP', 'Inter', sans-serif; }
    </style>
  </head>
  <body class="dark bg-gray-900 text-gray-100 h-screen flex flex-col overflow-hidden">

    <!-- ── Header ──────────────────────────────────────────── -->
    <header class="h-12 bg-gray-800 border-b border-gray-700 flex items-center gap-3 px-4 shrink-0">
      <span class="font-bold text-base tracking-wide">玄武 管理</span>
      <span class="text-gray-600">|</span>
      <div id="admin-header-info" class="flex items-center gap-2 text-sm text-gray-300"></div>
    </header>

    <!-- ── 3-pane body ─────────────────────────────────────── -->
    <div class="flex flex-1 overflow-hidden">

      <!-- Left: 号車一覧 (w-48) -->
      <aside class="w-48 bg-gray-800 border-r border-gray-700 flex flex-col shrink-0 overflow-hidden">
        <div class="px-3 py-2 text-xs font-semibold text-gray-400 tracking-widest border-b border-gray-700 shrink-0">
          号車一覧
        </div>
        <ul id="admin-truck-list" class="flex-1 overflow-y-auto py-1"></ul>
      </aside>

      <!-- Main: カテゴリーセクション縦積み + 品目4列グリッド -->
      <main id="admin-main-grid" class="flex-1 overflow-y-auto p-4 space-y-6"></main>

      <!-- Right: 品目詳細 / 入力補助 (w-72) -->
      <aside class="w-72 bg-gray-800 border-l border-gray-700 flex flex-col shrink-0 overflow-hidden">
        <div class="px-3 py-2 text-xs font-semibold text-gray-400 tracking-widest border-b border-gray-700 shrink-0">
          品目詳細
        </div>
        <div id="admin-right-content" class="flex-1 overflow-y-auto p-3">
          <p class="text-sm text-gray-500">品目を選択してください</p>
        </div>
      </aside>

    </div>

    <script type="module">
      import { initAdmin } from './js/admin/ui.js';
      initAdmin();
    </script>
  </body>
</html>

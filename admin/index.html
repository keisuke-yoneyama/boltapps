<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <!-- テーマ初期化: FOUC 防止のため最初に実行 -->
    <script>
      (function () {
        var t = localStorage.getItem('admin-theme') || 'dark';
        document.documentElement.className = t === 'light' ? 'theme-light' : 'dark';
      })();
    </script>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>玄武 管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: { extend: {} },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body { font-family: 'Noto Sans JP', 'Inter', sans-serif; }

      /* ─── テーマ: ダークモード（デフォルト）───────────────────── */
      html.dark body {
        background: #111c2e;
        background-attachment: fixed;
      }

      /* ─── テーマ: ライトモード ─────────────────────────────────── */
      /* 案A採用: 薄青ベース + 40px 方眼グリッド（設計図風） */
      html.theme-light body {
        background-color: #ecf1f8;
        background-image:
          linear-gradient(rgba(70, 120, 190, 0.07) 1px, transparent 1px),
          linear-gradient(90deg, rgba(70, 120, 190, 0.07) 1px, transparent 1px);
        background-size: 40px 40px;
        background-attachment: fixed;
        color: #1e293b;
      }

      /* パネル背景 */
      html.theme-light .bg-gray-900  { background-color: #eef3f9 !important; }
      html.theme-light .bg-gray-800  { background-color: #ffffff !important; }
      html.theme-light .bg-gray-700  { background-color: #dde8f2 !important; }
      html.theme-light .bg-gray-600  { background-color: #c8d8e8 !important; }

      /* サジェストサイドバー（非標準 bg-gray-850 クラスを使用） */
      html.theme-light #admin-suggest-sidebar { background-color: #f3f7fb !important; }

      /* テキスト */
      html.theme-light .text-white    { color: #1e293b !important; }
      html.theme-light .text-gray-100 { color: #0f172a !important; }
      html.theme-light .text-gray-200 { color: #1e293b !important; }
      html.theme-light .text-gray-300 { color: #334155 !important; }
      html.theme-light .text-gray-400 { color: #4a6480 !important; }
      html.theme-light .text-gray-500 { color: #6b829e !important; }
      html.theme-light .text-gray-600 { color: #94a3b8 !important; }

      /* ボーダー */
      html.theme-light .border-gray-700 { border-color: #bad0e3 !important; }
      html.theme-light .border-gray-600 { border-color: #c8d8e8 !important; }
      html.theme-light .border-gray-800 { border-color: #9ab0c8 !important; }

      /* ホバー */
      html.theme-light .hover\:bg-gray-700:hover   { background-color: #dde8f2 !important; }
      html.theme-light .hover\:bg-gray-600:hover   { background-color: #c8d8e8 !important; }
      html.theme-light .hover\:text-white:hover    { color: #0f172a !important; }
      html.theme-light .hover\:text-gray-100:hover { color: #0f172a !important; }
      html.theme-light .hover\:text-gray-200:hover { color: #1e293b !important; }
      html.theme-light .hover\:text-gray-300:hover { color: #334155 !important; }
      html.theme-light .hover\:border-gray-400:hover { border-color: #7090b0 !important; }

      /* 入力欄 */
      html.theme-light input:not([type=checkbox]):not([type=radio]),
      html.theme-light select,
      html.theme-light textarea {
        background-color: #ffffff !important;
        color: #1e293b !important;
        border-color: #bad0e3 !important;
      }
      html.theme-light input::placeholder,
      html.theme-light textarea::placeholder { color: #94a3b8 !important; }

      /* 品目カード: 主選択（blue-900/60） */
      html.theme-light .bg-blue-900\/60 {
        background-color: rgba(219, 234, 254, 0.9) !important;
        color: #1e3a8a !important;
      }
      /* 品目カード: 複数選択（blue-900/20） */
      html.theme-light .bg-blue-900\/20 {
        background-color: rgba(219, 234, 254, 0.4) !important;
        color: #1e3a8a !important;
      }
      /* カレンダー: 選択日（blue-900/25） */
      html.theme-light .bg-blue-900\/25 {
        background-color: rgba(219, 234, 254, 0.5) !important;
      }

      /* sticky バー / オーバーレイ */
      html.theme-light .bg-gray-900\/90 { background-color: rgba(236, 241, 248, 0.95) !important; }
      html.theme-light .bg-gray-900\/60 { background-color: rgba(236, 241, 248, 0.8)  !important; }

      /* opacity-variant 背景（上書きなしだとライトモードでも暗いまま → 暗背景×暗文字になる）
         特に A0 カレンダーの「計画あり」セル（bg-gray-800/80）で発生 */
      html.theme-light .bg-gray-800\/80  { background-color: rgba(255, 255, 255, 0.96) !important; }
      html.theme-light .bg-gray-800\/60  { background-color: rgba(255, 255, 255, 0.85) !important; }
      html.theme-light .bg-gray-700\/50  { background-color: rgba(221, 232, 242, 0.75) !important; }
      html.theme-light .bg-gray-900\/20  { background-color: rgba(238, 243, 249, 0.6)  !important; }
      html.theme-light .hover\:bg-gray-700\/50:hover { background-color: rgba(221, 232, 242, 0.85) !important; }

      /* テーマトグルボタン: ライトモード時に見えるよう色反転 */
      html.theme-light #admin-theme-toggle {
        color: #4a6480 !important;
      }
      html.theme-light #admin-theme-toggle:hover {
        background-color: #dde8f2 !important;
        color: #1e293b !important;
      }

      /* ── ローディングスピナー ──────────────────────────────── */
      @keyframes admin-spin {
        to { transform: rotate(360deg); }
      }
      .admin-spinner {
        display: inline-block;
        width: 0.9em;
        height: 0.9em;
        border: 2px solid currentColor;
        border-top-color: transparent;
        border-radius: 50%;
        animation: admin-spin 0.55s linear infinite;
        vertical-align: -0.15em;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body class="dark bg-gray-900 text-gray-100 h-screen flex flex-col overflow-hidden">

    <!-- ── パスワード保護オーバーレイ（直URLアクセス対策）──── -->
    <div id="admin-auth-overlay" class="fixed inset-0 bg-gray-900 z-[9999] flex items-center justify-center">
      <div class="bg-gray-800 border border-gray-700 rounded-2xl shadow-2xl p-8 w-80 text-center">
        <h2 class="text-lg font-bold text-gray-100 mb-1">管理画面</h2>
        <p class="text-sm text-gray-400 mb-5">4桁の暗証番号を入力してください</p>
        <input
          id="admin-auth-input"
          type="password"
          inputmode="numeric"
          pattern="[0-9]*"
          maxlength="4"
          autocomplete="off"
          class="w-full text-center text-3xl tracking-[0.5em] border-2 border-gray-600 rounded-xl py-3 bg-gray-900 text-gray-100 focus:outline-none focus:border-blue-500 mb-3"
          placeholder="○○○○"
        />
        <p id="admin-auth-error" class="text-red-400 text-sm mb-3 hidden">暗証番号が違います</p>
        <button id="admin-auth-submit"
          class="w-full py-2 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-medium transition-colors">
          入室する
        </button>
      </div>
    </div>
    <script>
      (function () {
        var overlay = document.getElementById('admin-auth-overlay');
        var input   = document.getElementById('admin-auth-input');
        var error   = document.getElementById('admin-auth-error');
        var submit  = document.getElementById('admin-auth-submit');
        var PW  = '4080';
        var KEY = 'adminAuth';

        // 認証済みならオーバーレイを即非表示
        if (sessionStorage.getItem(KEY) === 'granted') {
          overlay.style.display = 'none';
          return;
        }

        setTimeout(function () { if (input) input.focus(); }, 100);

        function tryLogin() {
          if (input.value === PW) {
            sessionStorage.setItem(KEY, 'granted');
            overlay.style.display = 'none';
          } else {
            error.classList.remove('hidden');
            input.value = '';
            input.focus();
          }
        }

        submit.addEventListener('click', tryLogin);
        input.addEventListener('keydown', function (e) {
          if (e.key === 'Enter') tryLogin();
        });
      })();
    </script>

    <!-- ── Header ──────────────────────────────────────────── -->
    <header class="h-12 bg-gray-800 border-b border-gray-700 flex items-center gap-2 px-4 shrink-0">
      <button id="admin-back-btn"
        class="hidden text-sm text-gray-400 hover:text-gray-100 transition-colors pr-3 border-r border-gray-700 mr-1">
        ← 戻る
      </button>
      <span class="font-bold text-base tracking-wide shrink-0">玄武 管理</span>
      <span id="admin-header-sep" class="hidden text-gray-600 shrink-0">|</span>
      <div id="admin-header-info" class="flex items-center gap-2 text-sm text-gray-300 min-w-0 overflow-hidden"></div>
      <button id="admin-theme-toggle"
        onclick="toggleAdminTheme()"
        title="昼間 / ナイトモード切替"
        class="ml-auto shrink-0 text-gray-400 hover:text-gray-100 text-base
               px-2 py-1 rounded hover:bg-gray-700 transition-colors leading-none">
      </button>
    </header>

    <!-- ── A0: カレンダー画面 ───────────────────────────────── -->
    <div id="admin-screen-calendar" class="flex-1 overflow-hidden flex">

      <!-- 左: カレンダー + 詳細 -->
      <div id="admin-cal-main" class="flex-1 overflow-y-auto p-4">

        <!-- 月ナビゲーション -->
        <div class="flex items-center justify-between mb-4">
          <button id="admin-cal-prev"
            class="text-gray-400 hover:text-white px-3 py-1.5 rounded hover:bg-gray-700 text-xl leading-none transition-colors">
            ‹
          </button>
          <span id="admin-cal-month" class="font-semibold text-gray-200 text-base"></span>
          <button id="admin-cal-next"
            class="text-gray-400 hover:text-white px-3 py-1.5 rounded hover:bg-gray-700 text-xl leading-none transition-colors">
            ›
          </button>
        </div>

        <!-- カレンダーグリッド -->
        <div id="admin-cal-grid" class="mb-6"></div>

        <!-- 日付選択後の計画一覧 -->
        <div id="admin-cal-detail"></div>

      </div>

      <!-- 右: シリーズ編集サイドバー（初期非表示） -->
      <aside id="admin-cal-sidebar"
        class="hidden w-80 bg-gray-800 border-l border-gray-700 flex flex-col shrink-0 overflow-hidden">
        <div class="px-3 py-2 text-xs font-semibold text-gray-400 tracking-widest border-b border-gray-700 shrink-0
                    flex items-center justify-between">
          <span>搬入計画 編集</span>
          <button id="a0-sidebar-close-btn"
            class="text-gray-500 hover:text-gray-200 text-base leading-none px-1">×</button>
        </div>
        <div id="admin-cal-sidebar-content" class="flex-1 overflow-y-auto p-3 space-y-4"></div>
      </aside>

    </div>

    <!-- ── A1: 搬入計画登録フォーム ────────────────────────── -->
    <div id="admin-screen-plan-form" style="display:none" class="flex-1 overflow-y-auto p-4">
      <div id="admin-plan-form-content" class="max-w-lg mx-auto"></div>
    </div>

    <!-- ── A2: 品目グリッド（3-pane）──────────────────────── -->
    <div id="admin-screen-grid" style="display:none" class="flex-1 overflow-hidden flex">

      <!-- Left: 号車一覧 (w-48) -->
      <aside class="w-48 bg-gray-800 border-r border-gray-700 flex flex-col shrink-0 overflow-hidden">
        <div class="px-3 py-2 text-xs font-semibold text-gray-400 tracking-widest border-b border-gray-700 shrink-0
                    flex items-center justify-between">
          <span>号車一覧</span>
          <button id="admin-truck-add-btn"
            title="号車を追加"
            class="text-gray-400 hover:text-white text-base leading-none px-1">＋</button>
        </div>
        <ul id="admin-truck-list" class="flex-1 overflow-y-auto py-1"></ul>
      </aside>

      <!-- Main: カテゴリーセクション縦積み + 品目4列グリッド -->
      <main id="admin-main-grid" class="flex-1 overflow-y-auto p-4 space-y-6 bg-gray-900"></main>

      <!-- Right: 品目詳細 / 入力補助 (w-72) -->
      <aside class="w-72 bg-gray-800 border-l border-gray-700 flex flex-col shrink-0 overflow-hidden">
        <div class="px-3 py-2 text-xs font-semibold text-gray-400 tracking-widest border-b border-gray-700 shrink-0">
          品目詳細
        </div>
        <div id="admin-right-content" class="flex-1 overflow-y-auto p-3">
          <p class="text-sm text-gray-500">品目を選択してください</p>
        </div>
      </aside>

      <!-- 部材名サジェスト専用サイドバー（bolt連携時・baseName入力中のみ表示） -->
      <aside id="admin-suggest-sidebar"
        style="display:none"
        class="w-52 bg-gray-850 border-l border-gray-700 flex flex-col shrink-0 overflow-hidden">
        <div class="px-2 py-1.5 text-xs font-semibold text-gray-400 border-b border-gray-700 shrink-0 flex items-center justify-between">
          <span>部材候補</span>
          <span id="admin-suggest-count" class="text-gray-600 text-[10px]"></span>
        </div>
        <!-- 階層タブ -->
        <div id="admin-suggest-tabs"
          class="shrink-0 border-b border-gray-700 flex overflow-x-auto"></div>
        <!-- 絞り込み検索 -->
        <div class="px-2 pt-1.5 pb-1 shrink-0">
          <input id="admin-suggest-search" type="text" placeholder="絞り込み…" autocomplete="off"
            class="w-full bg-gray-700 text-gray-100 rounded px-2 py-1 text-xs">
        </div>
        <!-- 候補リスト -->
        <ul id="admin-suggest-list" class="flex-1 overflow-y-auto py-0.5"></ul>
      </aside>

    </div>

    <script type="module" src="admin/app.js"></script>

    <!-- テーマ切替 -->
    <script>
      function _updateThemeToggleBtn() {
        var btn = document.getElementById('admin-theme-toggle');
        if (!btn) return;
        var isLight = document.documentElement.classList.contains('theme-light');
        btn.textContent = isLight ? '🌙' : '☀️';
        btn.title = isLight ? 'ナイトモードへ切替' : '昼間モードへ切替';
      }

      function toggleAdminTheme() {
        var isLight = document.documentElement.classList.contains('theme-light');
        var next = isLight ? 'dark' : 'light';
        document.documentElement.className = next === 'light' ? 'theme-light' : 'dark';
        localStorage.setItem('admin-theme', next);
        _updateThemeToggleBtn();
      }

      // ページ読み込み時にボタンアイコンを初期化
      document.addEventListener('DOMContentLoaded', _updateThemeToggleBtn);
    </script>
  </body>
</html>

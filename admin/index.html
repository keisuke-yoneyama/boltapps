<!doctype html>
<html lang="ja" class="dark">
  <head>
    <meta charset="UTF-8" />
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>玄武 管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: { extend: {} },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body { font-family: 'Noto Sans JP', 'Inter', sans-serif; }
    </style>
  </head>
  <body class="dark bg-gray-900 text-gray-100 h-screen flex flex-col overflow-hidden">

    <!-- ── Header ──────────────────────────────────────────── -->
    <header class="h-12 bg-gray-800 border-b border-gray-700 flex items-center gap-2 px-4 shrink-0">
      <button id="admin-back-btn"
        class="hidden text-sm text-gray-400 hover:text-gray-100 transition-colors pr-3 border-r border-gray-700 mr-1">
        ← 戻る
      </button>
      <span class="font-bold text-base tracking-wide shrink-0">玄武 管理</span>
      <span id="admin-header-sep" class="hidden text-gray-600 shrink-0">|</span>
      <div id="admin-header-info" class="flex items-center gap-2 text-sm text-gray-300 min-w-0 overflow-hidden"></div>
    </header>

    <!-- ── A0: カレンダー画面 ───────────────────────────────── -->
    <div id="admin-screen-calendar" class="flex-1 overflow-hidden flex">

      <!-- 左: カレンダー + 詳細 -->
      <div id="admin-cal-main" class="flex-1 overflow-y-auto p-4">

        <!-- 月ナビゲーション -->
        <div class="flex items-center justify-between mb-4">
          <button id="admin-cal-prev"
            class="text-gray-400 hover:text-white px-3 py-1.5 rounded hover:bg-gray-700 text-xl leading-none transition-colors">
            ‹
          </button>
          <span id="admin-cal-month" class="font-semibold text-gray-200 text-base"></span>
          <button id="admin-cal-next"
            class="text-gray-400 hover:text-white px-3 py-1.5 rounded hover:bg-gray-700 text-xl leading-none transition-colors">
            ›
          </button>
        </div>

        <!-- カレンダーグリッド -->
        <div id="admin-cal-grid" class="mb-6"></div>

        <!-- 日付選択後の計画一覧 -->
        <div id="admin-cal-detail"></div>

      </div>

      <!-- 右: シリーズ編集サイドバー（初期非表示） -->
      <aside id="admin-cal-sidebar"
        class="hidden w-80 bg-gray-800 border-l border-gray-700 flex flex-col shrink-0 overflow-hidden">
        <div class="px-3 py-2 text-xs font-semibold text-gray-400 tracking-widest border-b border-gray-700 shrink-0
                    flex items-center justify-between">
          <span>搬入計画 編集</span>
          <button id="a0-sidebar-close-btn"
            class="text-gray-500 hover:text-gray-200 text-base leading-none px-1">×</button>
        </div>
        <div id="admin-cal-sidebar-content" class="flex-1 overflow-y-auto p-3 space-y-4"></div>
      </aside>

    </div>

    <!-- ── A1: 搬入計画登録フォーム ────────────────────────── -->
    <div id="admin-screen-plan-form" style="display:none" class="flex-1 overflow-y-auto p-4">
      <div id="admin-plan-form-content" class="max-w-lg mx-auto"></div>
    </div>

    <!-- ── A2: 品目グリッド（3-pane）──────────────────────── -->
    <div id="admin-screen-grid" style="display:none" class="flex-1 overflow-hidden flex">

      <!-- Left: 号車一覧 (w-48) -->
      <aside class="w-48 bg-gray-800 border-r border-gray-700 flex flex-col shrink-0 overflow-hidden">
        <div class="px-3 py-2 text-xs font-semibold text-gray-400 tracking-widest border-b border-gray-700 shrink-0
                    flex items-center justify-between">
          <span>号車一覧</span>
          <button id="admin-truck-add-btn"
            title="号車を追加"
            class="text-gray-400 hover:text-white text-base leading-none px-1">＋</button>
        </div>
        <ul id="admin-truck-list" class="flex-1 overflow-y-auto py-1"></ul>
      </aside>

      <!-- Main: カテゴリーセクション縦積み + 品目4列グリッド -->
      <main id="admin-main-grid" class="flex-1 overflow-y-auto p-4 space-y-6 bg-gray-900"></main>

      <!-- Right: 品目詳細 / 入力補助 (w-72) -->
      <aside class="w-72 bg-gray-800 border-l border-gray-700 flex flex-col shrink-0 overflow-hidden">
        <div class="px-3 py-2 text-xs font-semibold text-gray-400 tracking-widest border-b border-gray-700 shrink-0">
          品目詳細
        </div>
        <div id="admin-right-content" class="flex-1 overflow-y-auto p-3">
          <p class="text-sm text-gray-500">品目を選択してください</p>
        </div>
      </aside>

    </div>

    <script type="module" src="admin/app.js"></script>
  </body>
</html>
